<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Contact Us | ShopEasy</title>
  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Segoe+UI&display=swap" rel="stylesheet" />
  <!-- AOS Animate on Scroll -->
  <link href="https://cdn.jsdelivr.net/npm/aos@2.3.4/dist/aos.css" rel="stylesheet" />
  <style>
    :root {
      --primary-color: blue;
      --accent-color: #4caf50;
      --bg-color: #f9f9f9;
      --text-color: #333;
      --card-bg: #fff;
      --input-bg: #fafafa;
      --input-border: #ddd;
      --input-focus: var(--accent-color);
      --shadow-light: rgba(0,0,0,0.07);
    }
    [data-theme="dark"] {
      --primary-color: #111;
      --accent-color: #4caf50;
      --bg-color: #1c1c1c;
      --text-color: #eee;
      --card-bg: #2c2c2c;
      --input-bg: #2a2a2a;
      --input-border: #444;
      --input-focus: var(--accent-color);
      --shadow-light: rgba(0,0,0,0.5);
    }
    * {
      box-sizing: border-box;
    }
    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      background-color: var(--bg-color);
      color: var(--text-color);
      line-height: 1.6;
      transition: background-color 0.3s, color 0.3s;
    }
    header {
      background-color: var(--primary-color);
      color: #fff;
      text-align: center;
      padding: 2rem 1rem;
      box-shadow: 0 2px 8px var(--shadow-light);
    }
    header h1 {
      margin-bottom: 0.3rem;
      font-weight: 700;
      font-size: 2.5rem;
      letter-spacing: 1px;
    }
    header p {
      font-weight: 300;
      font-size: 1.125rem;
      opacity: 0.85;
    }
    .container {
      max-width: 1200px;
      margin: 2rem auto 4rem;
      padding: 0 1.5rem;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 4rem;
      align-items: start;
    }
    /* Responsive 1 col */
    @media (max-width: 900px) {
      .container {
        grid-template-columns: 1fr;
        gap: 3rem;
      }
    }
    /* CONTACT FORM */
    .contact-form {
      background: var(--card-bg);
      padding: 2rem 2.5rem;
      border-radius: 12px;
      box-shadow: 0 8px 24px var(--shadow-light);
      position: relative;
      overflow: hidden;
      transition: box-shadow 0.3s;
    }
    .contact-form:hover {
      box-shadow: 0 12px 32px var(--shadow-light);
    }
    .contact-form h2 {
      color: var(--accent-color);
      margin-bottom: 1.5rem;
      font-weight: 700;
      font-size: 2rem;
      letter-spacing: 0.5px;
    }
    form {
      display: flex;
      flex-direction: column;
      gap: 1.5rem;
    }
    /* Floating label inputs */
    .form-group {
      position: relative;
      width: 100%;
    }
    input, textarea {
      width: 100%;
      padding: 1.25rem 1rem 0.5rem;
      border-radius: 10px;
      border: 1.8px solid var(--input-border);
      background-color: var(--input-bg);
      font-size: 1rem;
      color: var(--text-color);
      font-family: inherit;
      transition: border-color 0.3s;
      outline-offset: 2px;
      resize: vertical;
      min-height: 45px;
    }
    textarea {
      min-height: 120px;
    }
    input:focus, textarea:focus {
      border-color: var(--input-focus);
      outline: none;
      box-shadow: 0 0 8px var(--accent-color);
    }
    label {
      position: absolute;
      top: 1.25rem;
      left: 1rem;
      color: #999;
      font-size: 1rem;
      pointer-events: none;
      transition: all 0.25s ease;
      user-select: none;
      background: var(--card-bg);
      padding: 0 0.25rem;
    }
    /* Float label up on focus or filled */
    input:focus + label,
    textarea:focus + label,
    input:not(:placeholder-shown) + label,
    textarea:not(:placeholder-shown) + label {
      top: 0.2rem;
      font-size: 0.8rem;
      color: var(--accent-color);
      font-weight: 600;
    }
    button {
      padding: 1.2rem;
      border: none;
      background-color: var(--accent-color);
      color: #fff;
      font-weight: 700;
      font-size: 1.1rem;
      border-radius: 12px;
      cursor: pointer;
      transition: background-color 0.3s;
      box-shadow: 0 6px 14px rgba(76, 175, 80, 0.6);
    }
    button:hover {
      background-color: #3fae3f;
      box-shadow: 0 8px 18px rgba(76, 175, 80, 0.85);
    }
    /* CONTACT INFO */
    .contact-info {
      background: var(--card-bg);
      padding: 2rem 2.5rem;
      border-radius: 12px;
      box-shadow: 0 8px 24px var(--shadow-light);
      display: flex;
      flex-direction: column;
      gap: 2rem;
      transition: box-shadow 0.3s;
    }
    .contact-info:hover {
      box-shadow: 0 12px 32px var(--shadow-light);
    }
    .contact-info h2 {
      color: var(--accent-color);
      font-weight: 700;
      font-size: 2rem;
      letter-spacing: 0.5px;
      margin-bottom: 1rem;
    }
    .info-item {
      display: flex;
      align-items: center;
      gap: 1rem;
      font-size: 1.125rem;
      color: var(--text-color);
    }
    .info-item svg {
      width: 28px;
      height: 28px;
      flex-shrink: 0;
      fill: var(--accent-color);
      transition: fill 0.3s;
    }
    .info-item:hover svg {
      fill: #3fae3f;
    }
    .info-item span {
      font-weight: 500;
    }
    /* IMAGE SECTION */
    .contact-image {
      margin-top: 3rem;
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 12px 28px var(--shadow-light);
      max-height: 320px;
    }
    .contact-image img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      transition: transform 0.3s ease;
      cursor: default;
    }
    .contact-image img:hover {
      transform: scale(1.05);
    }
    /* FOOTER */
    footer {
      background-color: var(--primary-color);
      color: white;
      text-align: center;
      padding: 1.5rem 1rem;
      font-size: 0.9rem;
      letter-spacing: 0.05em;
    }
    .socials {
      margin-bottom: 0.8rem;
    }
    .socials a {
      margin: 0 12px;
      color: white;
      font-size: 1.8rem;
      text-decoration: none;
      transition: color 0.3s;
    }
    .socials a:hover {
      color: #81c784;
    }
    /* DARK MODE TOGGLE */
    .toggle-darkmode {
      position: fixed;
      top: 20px;
      right: 20px;
      padding: 10px 16px;
      border: none;
      background-color: var(--accent-color);
      color: white;
      border-radius: 30px;
      font-size: 1.2rem;
      cursor: pointer;
      box-shadow: 0 6px 14px rgba(76, 175, 80, 0.6);
      transition: background-color 0.3s;
      z-index: 1000;
    }
    .toggle-darkmode:hover {
      background-color: #3fae3f;
      box-shadow: 0 8px 18px rgba(76, 175, 80, 0.85);
    }
  </style>
</head>
<body data-theme="light">

  <button class="toggle-darkmode" aria-label="Toggle dark mode" onclick="toggleDarkMode()">🌙</button>

  <header>
    <h1>Contact Us</h1>
    <p>We'd love to hear from you! Reach out with any questions or feedback.</p>
  </header>
  <h1></h1>

  <main class="container" data-aos="fade-up" aria-label="Contact Us Section">

    <section class="contact-form" aria-labelledby="contactFormTitle">
      <h2 id="contactFormTitle">Send Us a Message</h2>
      <form>
        <div class="form-group">
          <input type="text" id="name" name="name" placeholder=" " required autocomplete="name" />
          <label for="name">Your Name</label>
        </div>
        <div class="form-group">
          <input type="email" id="email" name="email" placeholder=" " required autocomplete="email" />
          <label for="email">Your Email</label>
        </div>
         <div class="form-group">
          <input type="number" id="phone" name="email" placeholder=" " required autocomplete="Phone Number" />
          <label for="email">Your Phomr number</label>
        </div>
        <div class="form-group">
          <input type="text" id="subject" name="subject" placeholder=" " required />
          <label for="subject">Subject</label>
        </div>
        <div class="form-group">
          <textarea id="message" name="message" placeholder=" " required></textarea>
          <label for="message">Your Message</label>
        </div>
        <button type="submit">Send Message</button>
      </form>
    </section>

    <div class="contact-info" aria-labelledby="contactInfoTitle">
      <h2 id="contactInfoTitle">Contact Information</h2>
      <div class="info-item">
        <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false"><path d="M6.62 10.79a15.053 15.053 0 006.59 6.59l2.2-2.2a1 1 0 011.11-.21 11.05 11.05 0 003.44.55 1 1 0 011 1v3.5a1 1 0 01-1 1A17 17 0 013 5a1 1 0 011-1h3.5a1 1 0 011 1 11.05 11.05 0 00.55 3.44 1 1 0 01-.21 1.11l-2.22 2.24z"/></svg>
        <span>+234 9116872272 <br> +234 9010945904 <br> +234 8027532128</span><br>
        
      </div>
      <div class="info-item">
        <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false"><path d="M20 4H4a2 2 0 00-2 2v12a2 2 0 002 2h16a2 2 0 002-2V6a2 2 0 00-2-2zm0 2v.01L12 13 4 6.01V6h16z"/></svg>
        <span>support@XpressShopping.com</span>
      </div>
      <div class="info-item">
        <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zM7 9a5 5 0 0110 0c0 2.43-1.56 5.63-5 8.88C8.56 14.63 7 11.43 7 9z"/></svg>
        <span>12 ikeja, Lagos, Nigeria</span>
      </div>

      <div class="contact-image" aria-label="Store Image">
        <img src="https://source.unsplash.com/720x480/?customer-service,store" alt="Friendly customer service team" />
      </div>
    </div>

  </main>

  <footer>
    <div class="socials" aria-label="Social media links">
      <a href="#" aria-label="Facebook">📘</a>
      <a href="#" aria-label="Instagram">📸</a>
      <a href="#" aria-label="Twitter">🐦</a>
      <a href="#" aria-label="LinkedIn">💼</a>
    </div>
    <p>&copy; 2025 ShopEasy. All rights reserved.</p>
  </footer>

  <!-- AOS Library -->
  <script src="https://cdn.jsdelivr.net/npm/aos@2.3.4/dist/aos.js"></script>
  <script>
    AOS.init();

    function toggleDarkMode() {
      const theme = document.body.getAttribute('data-theme');
      document.body.setAttribute('data-theme', theme === 'dark' ? 'light' : 'dark');
    }
  </script>
</body>
</html>
